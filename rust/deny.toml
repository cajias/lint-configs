# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run: cargo deny check

[advisories]
# Deny crates with known security vulnerabilities.
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
# Accept only OSI-approved permissive / weak-copyleft licences.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
# Treat any unlicensed crate as an error.
unlicensed = "deny"
# Confidence threshold for licence text scanning.
confidence-threshold = 0.8

[bans]
# Deny duplicate versions of the same crate.
multiple-versions = "warn"
# Deny wildcard (path) dependencies in published crates.
wildcards = "allow"

[sources]
# Only allow crates from crates.io by default.
unknown-registry = "deny"
unknown-git = "deny"
